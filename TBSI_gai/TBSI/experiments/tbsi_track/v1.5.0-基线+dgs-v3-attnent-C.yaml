# ==============================================================================
# [MiniC验证] DGSFusion v3-attnent: 交叉注意力熵, 0参数
# ==============================================================================
# 核心改进（相对 v1.1.0 基线+dgs-v1）:
#   1. 完全替换路由器: 交叉注意力熵 → 模态置信度 (0参数)
#   2. 信息论原理: attention熵衡量RGB-TIR模态一致性
#      熵高→均匀关注→模态一致→高置信度; 熵低→差异大→低置信度
#   3. quality_mask = α 直接代入
#   4. 可视化: attention图可直接检视"RGB/TIR哪些区域对不上"
# ==============================================================================

DATA:
  MAX_SAMPLE_INTERVAL: 200
  MEAN:
  - 0.485
  - 0.456
  - 0.406
  - 0.449
  - 0.449
  - 0.449
  SEARCH:
    CENTER_JITTER: 3
    FACTOR: 4.0
    SCALE_JITTER: 0.25
    SIZE: 256
    NUMBER: 1
  STD:
  - 0.229
  - 0.224
  - 0.225
  - 0.226
  - 0.226
  - 0.226
  TEMPLATE:
    CENTER_JITTER: 0
    FACTOR: 2.0
    SCALE_JITTER: 0
    SIZE: 128
  TRAIN:
    DATASETS_NAME:
      - MiniLasHeRC_train
    DATASETS_RATIO:
      - 1
    SAMPLE_PER_EPOCH: 3000
  VAL:
    DATASETS_NAME:
      - MiniLasHeRC_train
    DATASETS_RATIO:
      - 1
    SAMPLE_PER_EPOCH: 1000
MODEL:
  PRETRAIN_FILE: "TBSITrack_SOT_Pretrained.pth.tar"
  EXTRA_MERGER: False
  RETURN_INTER: False
  DGSFUSION: True
  DGS_MODE: "v3"            # v3-attnent: 交叉注意力熵, 0参数
  BACKBONE:
    TYPE: vit_base_patch16_224_tbsi
    STRIDE: 16
    TBSI_LOC: [3, 6, 9]
  HEAD:
    TYPE: CENTER
    NUM_CHANNELS: 256
TRAIN:
  BACKBONE_MULTIPLIER: 0.1
  DROP_PATH_RATE: 0.1
  TBSI_DROP_PATH: [0.0, 0.0, 0.0]
  SOT_PRETRAIN: True
  BATCH_SIZE: 32
  EPOCH: 15
  GIOU_WEIGHT: 2.0
  L1_WEIGHT: 5.0
  GRAD_CLIP_NORM: 0.5
  LR: 0.0001
  LR_DROP_EPOCH: 10
  NUM_WORKER: 4
  OPTIMIZER: ADAMW
  PRINT_INTERVAL: 10
  SCHEDULER:
    TYPE: step
    DECAY_RATE: 0.1
  VAL_EPOCH_INTERVAL: 5
  WEIGHT_DECAY: 0.0001
  AMP: True
  PERSISTENT_WORKERS: True
  PREFETCH_FACTOR: 2
  SAVE_EPOCHS: [15]
TEST:
  EPOCH: 15
  SEARCH_FACTOR: 4.0
  SEARCH_SIZE: 256
  TEMPLATE_FACTOR: 2.0
  TEMPLATE_SIZE: 128
