DATA:
  MAX_SAMPLE_INTERVAL: 200
  MEAN: [0.485, 0.456, 0.406, 0.449, 0.449, 0.449]
  SEARCH: {CENTER_JITTER: 3, FACTOR: 4.0, NUMBER: 2, SCALE_JITTER: 0.25, SIZE: 256}
  STD: [0.229, 0.224, 0.225, 0.226, 0.226, 0.226]
  TEMPLATE: {CENTER_JITTER: 0, FACTOR: 2.0, SCALE_JITTER: 0, SIZE: 128}
  TRAIN:
    DATASETS_NAME: [LasHeR_train]
    DATASETS_RATIO: [1]
    SAMPLE_PER_EPOCH: 12000
  VAL:
    DATASETS_NAME: [LasHeR_test]
    DATASETS_RATIO: [1]
    SAMPLE_PER_EPOCH: 5000
MODEL:
  BACKBONE:
    STRIDE: 16
    TBSI_LOC: [3, 6, 9]
    TYPE: vit_base_patch16_224_tbsi
  HEAD: {NUM_CHANNELS: 256, TYPE: CENTER}
  NUM_TEMPORAL_TOKENS: 4
  PRETRAIN_FILE: TBSITrack_SOT_Pretrained.pth.tar
  TEMPORAL_TOKENS: true
TEST: {EPOCH: 8, SEARCH_FACTOR: 4.0, SEARCH_SIZE: 256, TEMPLATE_FACTOR: 2.0, TEMPLATE_SIZE: 128}
TRAIN:
  AMP: true
  BACKBONE_MULTIPLIER: 0.1
  BATCH_SIZE: 32
  DROP_PATH_RATE: 0.1
  EPOCH: 8
  GIOU_WEIGHT: 2.0
  GRAD_CLIP_NORM: 0.1
  L1_WEIGHT: 5.0
  LR: 2.5e-05
  LR_DROP_EPOCH: 6
  NUM_WORKER: 2
  OPTIMIZER: ADAMW
  PRINT_INTERVAL: 50
  SCHEDULER: {DECAY_RATE: 0.1, TYPE: step}
  SOT_PRETRAIN: true
  TBSI_DROP_PATH: [0.0, 0.0, 0.0]
  TEMPORAL_LR: 0.0001
  VAL_EPOCH_INTERVAL: 8
  WEIGHT_DECAY: 0.0001
