DATA:
  MAX_SAMPLE_INTERVAL: 200
  MEAN: [0.485, 0.456, 0.406, 0.449, 0.449, 0.449]
  STD: [0.229, 0.224, 0.225, 0.226, 0.226, 0.226]
  SEARCH: {SIZE: 256, FACTOR: 4.0, CENTER_JITTER: 3, SCALE_JITTER: 0.25}
  TEMPLATE: {SIZE: 128, FACTOR: 2.0, CENTER_JITTER: 0, SCALE_JITTER: 0}
  TRAIN: {DATASETS_NAME: [LasHeR_train], DATASETS_RATIO: [1], SAMPLE_PER_EPOCH: 12000}
  VAL: {DATASETS_NAME: [LasHeR_test], DATASETS_RATIO: [1], SAMPLE_PER_EPOCH: 5000}
MODEL:
  PRETRAIN_FILE: TBSITrack_SOT_Pretrained.pth.tar
  BACKBONE: {TYPE: vit_base_patch16_224_tbsi, STRIDE: 16, TBSI_LOC: [3, 6, 9]}
  HEAD: {TYPE: CENTER, NUM_CHANNELS: 256}
TRAIN:
  LR: 0.000025
  WEIGHT_DECAY: 0.0001
  EPOCH: 4
  LR_DROP_EPOCH: 10
  BATCH_SIZE: 32
  NUM_WORKER: 4
  OPTIMIZER: ADAMW
  BACKBONE_MULTIPLIER: 0.1
  GIOU_WEIGHT: 2.0
  L1_WEIGHT: 5.0
  PRINT_INTERVAL: 50
  VAL_EPOCH_INTERVAL: 4
  GRAD_CLIP_NORM: 0.1
  AMP: true
  DROP_PATH_RATE: 0.1
  TBSI_DROP_PATH: [0.0, 0.0, 0.0]
  SOT_PRETRAIN: true
  SCHEDULER: {TYPE: step, DECAY_RATE: 0.1}
TEST:
  EPOCH: 4
  SEARCH_FACTOR: 4.0
  SEARCH_SIZE: 256
  TEMPLATE_FACTOR: 2.0
  TEMPLATE_SIZE: 128
