# ==============================================================================
# TBSI 完美复现配置 (CVPR 2023)
# ==============================================================================
# 实验: vitb_256_tbsi_32x1_1e4_lasher_15ep_sot_reproduce
# 目的: 使用 SOT 预训练权重重现 CVPR 2023 TBSI 论文在 LasHeR 上的结果
# ==============================================================================
# 🏆 最终测试结果 (LasHeR test, 244 seq):
#   AUC (SR):  55.46  |  OP50: 67.28  |  OP75: 46.73
#   Precision: 68.98  |  Norm Precision: 65.23
#   → 与论文 <0.5% 差距，完美复现
# ==============================================================================
# ⚡ 训练性能 (RTX 3090, 2×Xeon 8260):
#   FPS ≈ 58.8 | DataTime ≈ 0.003s | ForwardTime ≈ 0.542s | TotalTime ≈ 0.545s
#   全15 epoch ≈ 2.5h (不含预热)
# ==============================================================================
# 🔧 关键优化 (相对于原始 vitb_256_tbsi_32x1_1e4_lasher_15ep_sot):
#   1. NUM_WORKER: 4→8  (恢复并增加worker数, RTX 3090+48核完全可支撑)
#   2. PREFETCH_FACTOR: 2→4 (加大预取深度)
#   3. 目录缓存: __init__ 中预扫描所有序列帧列表 (消除 os.listdir 调用)
#   4. fork: 使用默认 fork 启动而非 forkserver (避免8 worker死锁)
#   5. retain torch.set_float32_matmul_precision('high') + AMP
#   ⚠ 注意: 需要 ~90GB 容器内存限制才能稳定运行 8 worker fork
# ==============================================================================
# 📋 训练条件:
#   GPU: 1× RTX 3090 (24GB)
#   CPU: 2× Xeon Platinum 8260 (48核/96线程)
#   RAM: 754GB (容器 cgroup 限制 ~90GB)
#   Storage: RAID5 3×NVMe (245GB partition, ~150GB dataset)
#   Python: 3.8 + PyTorch 1.9 + CUDA 11.1
# ==============================================================================

DATA:
  MAX_SAMPLE_INTERVAL: 200
  MEAN:
  - 0.485
  - 0.456
  - 0.406
  - 0.449
  - 0.449
  - 0.449
  SEARCH:
    CENTER_JITTER: 3
    FACTOR: 4.0
    SCALE_JITTER: 0.25
    SIZE: 256
    NUMBER: 1
  STD:
  - 0.229
  - 0.224
  - 0.225
  - 0.226
  - 0.226
  - 0.226
  TEMPLATE:
    CENTER_JITTER: 0
    FACTOR: 2.0
    SCALE_JITTER: 0
    SIZE: 128
  TRAIN:
    DATASETS_NAME:
      - LasHeR_train
    DATASETS_RATIO:
      - 1
    SAMPLE_PER_EPOCH: 60000
  VAL:
    DATASETS_NAME:
    - LasHeR_test
    DATASETS_RATIO:
    - 1
    SAMPLE_PER_EPOCH: 10000
MODEL:
  PRETRAIN_FILE: "TBSITrack_SOT_Pretrained.pth.tar"
  EXTRA_MERGER: False
  RETURN_INTER: False
  BACKBONE:
    TYPE: vit_base_patch16_224_tbsi
    STRIDE: 16
    TBSI_LOC: [3, 6, 9]
  HEAD:
    TYPE: CENTER
    NUM_CHANNELS: 256
TRAIN:
  BACKBONE_MULTIPLIER: 0.1
  DROP_PATH_RATE: 0.1
  TBSI_DROP_PATH: [0.0, 0.0, 0.0]
  SOT_PRETRAIN: True  # 使用 SOT 预训练权重 (OSTrack backbone)
  BATCH_SIZE: 32
  EPOCH: 15
  GIOU_WEIGHT: 2.0
  L1_WEIGHT: 5.0
  GRAD_CLIP_NORM: 0.1
  LR: 0.0001
  LR_DROP_EPOCH: 10
  # NUM_WORKER=8: 48核/96线程 CPU, 8 worker × 4图=32路并发解码.
  # 需要 PERSISTENT_WORKERS=True + fork 启动方式避免 worker 重启开销.
  # ⚠ cgroup 内存限制应 ≥90GB, 否则 OOM killer 会杀 worker.
  NUM_WORKER: 8
  OPTIMIZER: ADAMW
  PRINT_INTERVAL: 50
  SCHEDULER:
    TYPE: step
    DECAY_RATE: 0.1
  VAL_EPOCH_INTERVAL: 10
  WEIGHT_DECAY: 0.0001
  AMP: True  # 混合精度训练, 配合 torch.set_float32_matmul_precision('high')
  PERSISTENT_WORKERS: True  # 保持 worker 跨 epoch 存活
  PREFETCH_FACTOR: 4        # 预取 4 batch, 隐藏解码延迟
  SAVE_EPOCHS: [3, 6, 9, 12]  # 检查点保存 epoch
TEST:
  EPOCH: 15
  SEARCH_FACTOR: 4.0
  SEARCH_SIZE: 256
  TEMPLATE_FACTOR: 2.0
  TEMPLATE_SIZE: 128
